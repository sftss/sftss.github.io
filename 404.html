<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Page introuvable - Sefer Tasdemir Portfolio" />
    <meta name="robots" content="noindex, follow" />
    <link rel="icon" href="assets/img/logo.webp" type="image/png" />
    <link rel="stylesheet" href="assets/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/theme-toggles@4.10.1/css/within.min.css" />
    <title>404 | Sefer Tasdemir</title>
    <script>
      (function(){var t=null;try{t=localStorage.getItem('preferredTheme');}catch(e){}if(!t)t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)})();
    </script>
    <style>
      .not-found {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 4rem 2rem;
        background: var(--background-color);
      }
      .not-found-code {
        font-size: 12rem;
        font-weight: 700;
        background: var(--gradient-primary);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 1rem;
      }
      .not-found-title {
        font-size: 3rem;
        color: var(--text-color);
        margin-bottom: 1.5rem;
        font-weight: 600;
      }
      .not-found-desc {
        font-size: 1.8rem;
        color: var(--text-color-para);
        max-width: 48rem;
        margin-bottom: 4rem;
        line-height: 1.6;
      }
      .not-found-actions {
        display: flex;
        gap: 2rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      @media (max-width: 40em) {
        .not-found-code { font-size: 8rem; }
        .not-found-title { font-size: 2.2rem; }
        .not-found-desc { font-size: 1.6rem; }
      }
    </style>
  </head>

  <body>
    <header id="header" class="header">
      <div class="header-content">
        <div class="header-logo-container">
          <div class="header-logo-img-container">
            <img src="assets/img/pp.webp" alt="Picture Sefer Tasdemir" class="header-logo-img" />
          </div>
          <span class="header-logo-sub">Sefer Tasdemir</span>
        </div>
        <div class="header-main">
          <ul class="header-liens">
            <li><a href="/#home" class="header-link" data-i18n="header.home"></a></li>
            <li><a href="/#projects" class="header-link" data-i18n="header.projects"></a></li>
            <li><a href="/#contact" class="header-link" data-i18n="header.contact"></a></li>
            <li><a href="/#CV" class="header-link">CV</a></li>
          </ul>
          <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </div>
    </header>

    <main class="not-found">
      <p class="not-found-code" data-i18n="notFound.code"></p>
      <h1 class="not-found-title" data-i18n="notFound.title"></h1>
      <p class="not-found-desc" data-i18n="notFound.desc"></p>
      <div class="not-found-actions">
        <a href="/" class="btn btn-project" data-i18n="notFound.backHome"></a>
        <a href="/#projects" class="btn btn-project" data-i18n="notFound.seeProjects"></a>
      </div>
    </main>

    <div id="div_theme_bot">
      <button id="themeToggle" class="theme-toggle theme-toggle--toggled" type="button" title="Toggle theme" aria-label="Toggle theme">
        <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" class="theme-toggle__within" height="1em" width="1em" viewBox="0 0 32 32" fill="currentColor">
          <clipPath id="theme-toggle__within__clip">
            <path d="M0 0h32v32h-32ZM6 16A1 1 0 0026 16 1 1 0 006 16" />
          </clipPath>
          <g clip-path="url(#theme-toggle__within__clip)">
            <path d="M30.7 21.3 27.1 16l3.7-5.3c.4-.5.1-1.3-.6-1.4l-6.3-1.1-1.1-6.3c-.1-.6-.8-.9-1.4-.6L16 5l-5.4-3.7c-.5-.4-1.3-.1-1.4.6l-1 6.3-6.4 1.1c-.6.1-.9.9-.6 1.3L4.9 16l-3.7 5.3c-.4.5-.1 1.3.6 1.4l6.3 1.1 1.1 6.3c.1.6.8.9 1.4.6l5.3-3.7 5.3 3.7c.5.4 1.3.1 1.4-.6l1.1-6.3 6.3-1.1c.8-.1 1.1-.8.7-1.4zM16 25.1c-5.1 0-9.1-4.1-9.1-9.1 0-5.1 4.1-9.1 9.1-9.1s9.1 4.1 9.1 9.1c0 5.1-4 9.1-9.1 9.1z" />
          </g>
          <path class="theme-toggle__within__circle" d="M16 7.7c-4.6 0-8.2 3.7-8.2 8.2s3.6 8.4 8.2 8.4 8.2-3.7 8.2-8.2-3.6-8.4-8.2-8.4zm0 14.4c-3.4 0-6.1-2.9-6.1-6.2s2.7-6.1 6.1-6.1c3.4 0 6.1 2.9 6.1 6.2s-2.7 6.1-6.1 6.1z" />
          <path class="theme-toggle__within__inner" d="M16 9.5c-3.6 0-6.4 2.9-6.4 6.4s2.8 6.5 6.4 6.5 6.4-2.9 6.4-6.4-2.8-6.5-6.4-6.5z" />
        </svg>
      </button>
    </div>

    <script src="js/botpress.js" defer></script>
    <script src="https://files.bpcontent.cloud/2025/04/12/10/20250412104746-SVC1SOL9.js" defer></script>
    <script src="https://unpkg.com/i18next/dist/umd/i18next.min.js"></script>
    <script src="js/i18n.js" async></script>
    <script src="js/script.js" defer></script>
  </body>
</html>
